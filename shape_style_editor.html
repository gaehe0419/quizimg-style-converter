<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>도형 SVG 스타일 변환기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; font-size: 13px; background: #f5f5f5; height: 100vh; overflow: hidden; }

    #app {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 12px;
      padding: 12px;
      height: 100vh;
    }

    /* 왼쪽 패널 */
    #panel {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
    }

    #panel-title {
      font-size: 14px;
      font-weight: 600;
      color: #131313;
      padding-bottom: 10px;
      border-bottom: 1px solid #f0f0f0;
    }

    .panel-section { display: flex; flex-direction: column; gap: 8px; }
    .panel-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #999;
    }
    .panel-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #444;
    }

    /* 컬러 도트 */
    .color-dots { display: flex; gap: 6px; }
    .color-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      outline: 2px solid transparent;
      outline-offset: 1px;
      transition: outline-color .15s;
      flex-shrink: 0;
    }
    .color-dot.selected { outline-color: #555; }
    .color-dot:hover { opacity: .8; }

    /* 드롭다운 */
    select {
      width: 100px;
      font-size: 12px;
      padding: 4px 6px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      color: #333;
    }

    /* 버튼 */
    #btn-apply {
      padding: 9px;
      background: #131313;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
      margin-top: 4px;
    }
    #btn-apply:hover { background: #333; }
    #btn-apply:disabled { background: #ccc; cursor: default; }

    #no-selection {
      font-size: 12px;
      color: #bbb;
      text-align: center;
      padding: 14px 0;
      line-height: 1.6;
    }

    #style-options {
      display: none;
      flex-direction: column;
      gap: 14px;
    }

    /* 오른쪽 뷰어 */
    #viewer {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }

    .tabs { display: flex; gap: 6px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
    .tab {
      font-size: 12px;
      padding: 4px 14px;
      border-radius: 5px;
      border: none;
      background: transparent;
      color: #999;
      cursor: pointer;
    }
    .tab.active { background: #f0f0f0; color: #131313; font-weight: 600; }

    #svg-canvas {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      border-radius: 6px;
      overflow: auto;
      min-height: 0;
    }
    #svg-canvas .placeholder {
      color: #ccc;
      font-size: 13px;
      text-align: center;
      line-height: 2;
    }
    #svg-canvas svg {
      max-width: 100%;
      max-height: 100%;
    }

    /* 클릭 가능 요소 */
    #svg-canvas svg [data-sid] { cursor: pointer; }
    #svg-canvas svg [data-sid]:hover { outline: 1.5px dashed #1b75bc; }
    #svg-canvas svg [data-sid].selected-el { outline: 2px solid #1b75bc; }

    /* 업로드 드롭존 */
    #dropzone {
      border: 2px dashed #ddd;
      border-radius: 6px;
      padding: 14px 10px;
      text-align: center;
      color: #bbb;
      font-size: 12px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      line-height: 1.8;
    }
    #dropzone:hover, #dropzone.dragover { border-color: #1b75bc; color: #1b75bc; }
    #dropzone .dz-icon { font-size: 20px; display: block; margin-bottom: 2px; }

    /* 에러 */
    #error-msg {
      display: none;
      font-size: 11px;
      color: #be1e2d;
      padding: 5px 8px;
      background: #fff0f0;
      border-radius: 4px;
      line-height: 1.5;
    }

    /* 뷰어 하단 */
    #viewer-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 4px;
    }
    #elem-info {
      font-size: 11px;
      color: #aaa;
    }
    #btn-download {
      padding: 7px 16px;
      background: transparent;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: #444;
    }
    #btn-download:hover { border-color: #555; color: #131313; }
    #btn-download:disabled { opacity: .4; cursor: default; }

    /* color input */
    input[type="color"] {
      width: 36px; height: 24px;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      padding: 1px 2px;
      background: #fff;
    }

    /* 치수선 도구 */
    #btn-dimtool {
      padding: 8px;
      background: transparent;
      color: #444;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      width: 100%;
      text-align: center;
    }
    #btn-dimtool:hover { border-color: #888; color: #131313; }
    #btn-dimtool.active { background: #1b75bc; color: #fff; border-color: #1b75bc; }

    #dim-panel {
      display: none;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
      background: #f0f6ff;
      border: 1px solid #c5dcf5;
      border-radius: 6px;
      font-size: 12px;
    }
    #dim-panel .dim-step {
      font-size: 11px;
      color: #1b75bc;
      font-weight: 600;
    }
    #dim-panel input[type="text"] {
      width: 100%;
      padding: 5px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Nanum Myeongjo', serif;
      font-weight: 700;
    }
    #dim-arch-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #dim-arch-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #dim-arch { width: 100%; accent-color: #1b75bc; }
    #dim-arch-val {
      font-size: 11px;
      color: #555;
      min-width: 36px;
      text-align: right;
    }
    #dim-arch-hint {
      font-size: 10px;
      color: #999;
    }
    .dim-btns { display: flex; gap: 6px; }
    .dim-btns button {
      flex: 1;
      padding: 7px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: #fff;
    }
    #dim-confirm { background: #131313 !important; color: #fff !important; border-color: #131313 !important; }
    #dim-confirm:disabled { background: #ccc !important; border-color: #ccc !important; cursor: default; }

    /* 치수선 모드 커서 */
    #svg-canvas.dim-mode { cursor: crosshair; }
    #svg-canvas.dim-mode svg [data-sid] { cursor: crosshair; }

    /* 클릭 마커 */
    .dim-marker { pointer-events: none; }
  </style>
</head>
<body>
<div id="app">
  <!-- 왼쪽 패널 -->
  <aside id="panel">
    <div id="panel-title">도형 SVG 스타일 변환기</div>

    <!-- 업로드 -->
    <div class="panel-section">
      <span class="panel-label">SVG 업로드</span>
      <div id="dropzone">
        <span class="dz-icon">📂</span>
        클릭하거나 SVG 파일을 드롭
        <input type="file" id="file-input" accept=".svg,image/svg+xml" style="display:none">
      </div>
      <div id="error-msg"></div>
    </div>

    <!-- 선택 안내 -->
    <div id="no-selection">SVG를 업로드한 뒤<br>요소를 클릭하면<br>스타일을 편집할 수 있습니다</div>

    <!-- 스타일 옵션 -->
    <div id="style-options">

      <!-- 타입 변경 -->
      <div class="panel-section" id="section-type">
        <span class="panel-label">타입</span>
        <div class="panel-row">
          <select id="elem-type-sel" style="width:100%;">
            <option value="outer-stroke">바깥쪽 선</option>
            <option value="inner-stroke">안쪽 선</option>
            <option value="dashed">점선 (치수선)</option>
            <option value="right-angle">직각 기호</option>
            <option value="fill">채우기</option>
            <option value="text">텍스트</option>
          </select>
        </div>
      </div>

      <!-- 선 (outer/inner/right-angle) -->
      <div class="panel-section" id="section-stroke" style="display:none;">
        <span class="panel-label">선</span>
        <div class="panel-row">
          <span>색상</span>
          <div class="color-dots" id="stroke-colors"></div>
        </div>
        <div class="panel-row">
          <span>굵기</span>
          <select id="stroke-width">
            <option value="1">1px</option>
            <option value="1.5">1.5px</option>
            <option value="2">2px</option>
            <option value="2.5">2.5px</option>
          </select>
        </div>
      </div>

      <!-- 점선 -->
      <div class="panel-section" id="section-dashed" style="display:none;">
        <span class="panel-label">점선</span>
        <div class="panel-row">
          <span>색상</span>
          <div class="color-dots" id="dashed-colors"></div>
        </div>
        <div class="panel-row">
          <span>굵기</span>
          <select id="dashed-width">
            <option value=".75">0.75px</option>
            <option value="1">1px</option>
            <option value="1.5">1.5px</option>
          </select>
        </div>
        <div class="panel-row">
          <span>간격</span>
          <select id="dashed-array">
            <option value="3 2">3pt / 2pt</option>
            <option value="5 5">5pt / 5pt</option>
            <option value="4 3">4pt / 3pt</option>
          </select>
        </div>
        <!-- 아치 편집 (path 요소일 때만 표시) -->
        <div id="section-arch" style="display:none; flex-direction:column; gap:6px;">
          <div class="panel-row">
            <span>아치 높이</span>
            <span id="arch-val-display" style="font-size:11px; color:#555; min-width:28px; text-align:right;">20</span>
          </div>
          <input type="range" id="arch-slider" min="-80" max="80" value="20" step="1" style="width:100%; accent-color:#1b75bc;">
          <span style="font-size:10px; color:#999;">음수(-): 반대 방향으로 휨</span>
          <!-- 갭 설정 -->
          <div class="panel-row" style="margin-top:4px;">
            <span style="font-weight:600; font-size:11px;">텍스트 갭</span>
            <label style="font-size:11px; display:flex; align-items:center; gap:4px; cursor:pointer;">
              <input type="checkbox" id="gap-enable" style="cursor:pointer;"> 사용
            </label>
          </div>
          <div id="gap-controls" style="display:none; flex-direction:column; gap:4px;">
            <div class="panel-row">
              <span>갭 위치</span>
              <span id="gap-pos-display" style="font-size:11px; color:#555; min-width:28px; text-align:right;">50%</span>
            </div>
            <input type="range" id="gap-pos" min="15" max="85" value="50" step="1" style="width:100%; accent-color:#1b75bc;">
            <div class="panel-row">
              <span>갭 크기</span>
              <span id="gap-size-display" style="font-size:11px; color:#555; min-width:28px; text-align:right;">10</span>
            </div>
            <input type="range" id="gap-size" min="3" max="25" value="10" step="1" style="width:100%; accent-color:#1b75bc;">
          </div>
        </div>
      </div>

      <!-- 채우기 -->
      <div class="panel-section" id="section-fill" style="display:none;">
        <span class="panel-label">채우기</span>
        <div class="panel-row">
          <span>색상</span>
          <input type="color" id="fill-color" value="#ffffff">
        </div>
      </div>

      <!-- 텍스트 -->
      <div class="panel-section" id="section-text" style="display:none;">
        <span class="panel-label">텍스트</span>
        <div class="panel-row">
          <span>폰트</span>
          <select id="text-font">
            <option value="nanum">나눔명조 Bold</option>
            <option value="times">Times NR Italic</option>
          </select>
        </div>
        <div class="panel-row">
          <span>크기</span>
          <select id="text-size">
            <option value="14">14px</option>
            <option value="16">16px</option>
            <option value="18">18px</option>
            <option value="20">20px</option>
          </select>
        </div>
        <div class="panel-row">
          <span>색상</span>
          <input type="color" id="text-color" value="#131313">
        </div>
      </div>

    </div>

    <button id="btn-apply" disabled>파운데이션 일괄 적용</button>

    <!-- 출력 사이즈 -->
    <div class="panel-section" id="section-size">
      <span class="panel-label">출력 크기</span>
      <div class="panel-row">
        <span>폭 (px)</span>
        <input type="number" id="out-width" value="400" min="50" max="2000" step="1"
          style="width:80px; padding:4px 6px; border:1px solid #ddd; border-radius:4px; font-size:12px;">
      </div>
      <div class="panel-row">
        <span>높이 (px)</span>
        <input type="number" id="out-height" value="" min="50" max="2000" step="1" placeholder="자동"
          style="width:80px; padding:4px 6px; border:1px solid #ddd; border-radius:4px; font-size:12px; color:#888;">
      </div>
      <div style="font-size:10px; color:#aaa;">높이 비워두면 비율 유지</div>
    </div>

    <!-- 치수선 도구 -->
    <button id="btn-dimtool" disabled>📐 치수선 추가</button>

    <div id="dim-panel">
      <div class="dim-step" id="dim-step-msg">1단계: 시작점을 클릭하세요</div>

      <div class="panel-section">
        <span class="panel-label">레이블</span>
        <input type="text" id="dim-label" placeholder="예: 3, 5, x+1" value="">
      </div>

      <div class="panel-section">
        <span class="panel-label">선 색상</span>
        <div class="color-dots" id="dim-colors"></div>
      </div>

      <div class="panel-section" id="dim-arch-wrap">
        <div id="dim-arch-row">
          <span class="panel-label">아치 높이</span>
          <span id="dim-arch-val">20</span>
        </div>
        <input type="range" id="dim-arch" min="-80" max="80" value="20" step="1">
        <span id="dim-arch-hint">음수(-): 반대 방향으로 휨</span>
      </div>

      <div class="dim-btns">
        <button id="dim-cancel">취소</button>
        <button id="dim-confirm" disabled>추가</button>
      </div>
    </div>
  </aside>

  <!-- 오른쪽 뷰어 -->
  <main id="viewer">
    <div class="tabs">
      <button class="tab active" data-tab="converted">변환 결과</button>
      <button class="tab" data-tab="original">원본</button>
    </div>
    <div id="svg-canvas">
      <div class="placeholder">📐<br>SVG 파일을 업로드하세요</div>
    </div>
    <div id="viewer-footer">
      <span id="elem-info"></span>
      <button id="btn-download" disabled>SVG 다운로드</button>
    </div>
  </main>
</div>

<script>
// ── 상수 ────────────────────────────────────────────────────
const FOUNDATION = {
  // cls-1: 검정 실선 외곽(도형 변, 원)
  strokeColors: ['#000000','#c00000','#e97132','#727171','#1b75bc'],
  outerStrokeWidth: '1',      // cls-1 기본값
  innerStrokeWidth: '1',
  accentStrokeWidth: '1.5',   // cls-3/orange 강조선
  // cls-2: 회색 점선 (치수/접선)
  dashedColor: '#727171',
  dashedWidth: '.75',
  dashedArray: '3 2',
  // fill
  fillColor: '#ffffff',
  dotFill: '#000000',         // cls-dot 접점 표시
  // font
  fontNormal: 'NanumMyeongjoBold, NanumMyeongjo',
  fontFunction: "'Times New Roman', serif",
  fontSizeMain: '17',         // cls-text-main
  fontSizeSub: '11',          // cls-text-sub
  fontColor: '#000000',
};

// ── 상태 ────────────────────────────────────────────────────
const AppState = {
  svgDoc: null,
  originalSvgText: '',
  selectedSid: null,
  elements: new Map(),  // sid → { el, type }
  activeTab: 'converted',
};

// ── SVGParser ────────────────────────────────────────────────
const SVGParser = {
  parse(svgText) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgText, 'image/svg+xml');
    const err = doc.querySelector('parsererror');
    if (err) throw new Error('SVG 파싱 오류');
    return doc;
  },

  annotate(doc) {
    AppState.elements.clear();
    const styleMap = SVGParser._buildStyleMap(doc);
    let counter = 0;
    const targets = doc.querySelectorAll(
      'path, line, polyline, polygon, rect, circle, ellipse, text'
    );
    targets.forEach(el => {
      const sid = 'sid-' + (counter++);
      el.setAttribute('data-sid', sid);
      SVGParser._inlineComputedStyles(el, styleMap);
      const type = SVGParser._classify(el);
      AppState.elements.set(sid, { el, type });
    });
  },

  _buildStyleMap(doc) {
    const map = {};
    doc.querySelectorAll('style').forEach(styleEl => {
      const text = styleEl.textContent || '';
      const ruleRegex = /([^{]+)\{([^}]*)\}/g;
      let m;
      while ((m = ruleRegex.exec(text)) !== null) {
        const selectors = m[1];
        const decls = m[2];
        const props = {};
        decls.split(';').forEach(d => {
          const ci = d.indexOf(':');
          if (ci < 0) return;
          const prop = d.slice(0, ci).trim();
          const val = d.slice(ci + 1).trim();
          if (prop) props[prop] = val;
        });
        selectors.split(',').forEach(sel => {
          const cn = sel.trim().match(/\.([^\s.:#[\]]+)/);
          if (cn) {
            if (!map[cn[1]]) map[cn[1]] = {};
            Object.assign(map[cn[1]], props);
          }
        });
      }
    });
    return map;
  },

  _inlineComputedStyles(el, styleMap) {
    const classes = (el.getAttribute('class') || '').split(/\s+/).filter(Boolean);
    if (!classes.length) return;
    const computed = {};
    classes.forEach(cls => {
      if (styleMap[cls]) Object.assign(computed, styleMap[cls]);
    });
    // CSS 'style' attribute overrides class styles
    const inlineStyle = el.getAttribute('style') || '';
    inlineStyle.split(';').forEach(d => {
      const ci = d.indexOf(':');
      if (ci < 0) return;
      const prop = d.slice(0, ci).trim();
      const val = d.slice(ci + 1).trim();
      if (prop) computed[prop] = val;
    });
    // SVG presentation attributes (kebab → as-is) — only set if not already inline
    const presentationProps = ['fill','stroke','stroke-width','stroke-dasharray','stroke-miterlimit','stroke-linecap','font-family','font-size','font-weight','font-style'];
    presentationProps.forEach(prop => {
      if (computed[prop] && !el.getAttribute(prop)) {
        el.setAttribute(prop, computed[prop]);
      }
    });
    el.removeAttribute('class');
    el.removeAttribute('style');
  },

  _classify(el) {
    const tag = el.tagName.toLowerCase();

    if (tag === 'text') return 'text';

    // 점선 감지 (인라인 속성으로 이미 resolve됨)
    const dashAttr = el.getAttribute('stroke-dasharray');
    if (dashAttr) return 'dashed';

    // 직각 기호: rect 중 width 또는 height ≤ 12
    if (tag === 'rect') {
      const w = parseFloat(el.getAttribute('width') || '999');
      const h = parseFloat(el.getAttribute('height') || '999');
      if (w <= 12 || h <= 12) return 'right-angle';
    }

    // 채우기 요소
    const fill = el.getAttribute('fill') || '';
    if (fill && fill !== 'none' && fill !== 'transparent') {
      // circle/ellipse는 꼭짓점 마커로 자주 쓰임 → stroke 타입으로
      if (tag === 'circle' || tag === 'ellipse') return 'inner-stroke';
      return 'fill';
    }

    // 바깥쪽 선
    if (tag === 'polygon' || tag === 'polyline' || tag === 'rect') return 'outer-stroke';

    return 'inner-stroke';
  },
};

// ── StyleManager ─────────────────────────────────────────────
const StyleManager = {
  applyFoundation() {
    AppState.elements.forEach(({ el, type }) => {
      switch (type) {
        case 'outer-stroke':
          el.setAttribute('stroke', FOUNDATION.strokeColors[0]);
          el.setAttribute('stroke-width', FOUNDATION.outerStrokeWidth);
          el.removeAttribute('stroke-dasharray');
          break;
        case 'inner-stroke':
        case 'right-angle':
          el.setAttribute('stroke', FOUNDATION.strokeColors[0]);
          el.setAttribute('stroke-width', FOUNDATION.innerStrokeWidth);
          el.removeAttribute('stroke-dasharray');
          break;
        case 'dashed': {
          const s = (el.getAttribute('stroke') || '').toLowerCase();
          const isNeutral = !s || s === 'none' || s === 'black' || s === '#000000'
            || s === '#131313' || s === 'gray' || s === 'grey'
            || StyleManager._isGrayHex(s);
          if (isNeutral) el.setAttribute('stroke', FOUNDATION.dashedColor);
          el.setAttribute('stroke-width', FOUNDATION.dashedWidth);
          el.setAttribute('stroke-dasharray', FOUNDATION.dashedArray);
          break;
        }
        case 'fill':
          el.setAttribute('fill', FOUNDATION.fillColor);
          // 테두리 선도 함께 적용
          if (el.getAttribute('stroke') && el.getAttribute('stroke') !== 'none') {
            el.setAttribute('stroke', FOUNDATION.strokeColors[0]);
            el.setAttribute('stroke-width', FOUNDATION.innerStrokeWidth);
            el.removeAttribute('stroke-dasharray');
          }
          break;
        case 'text':
          el.setAttribute('font-family', FOUNDATION.fontNormal);
          el.setAttribute('font-weight', '700');
          el.setAttribute('font-style', 'normal');
          el.setAttribute('fill', FOUNDATION.fontColor);
          if (!el.getAttribute('font-size')) el.setAttribute('font-size', FOUNDATION.fontSizeMain);
          break;
      }
    });
  },

  _isGrayHex(hex) {
    // #rrggbb 형식에서 R≈G≈B이면 gray로 판단
    const m = hex.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
    if (!m) return false;
    const r = parseInt(m[1], 16), g = parseInt(m[2], 16), b = parseInt(m[3], 16);
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    return (max - min) < 30; // 채도 낮으면 gray
  },

  read(sid) {
    const { el, type } = AppState.elements.get(sid);
    return {
      type,
      stroke: el.getAttribute('stroke') || '',
      strokeWidth: el.getAttribute('stroke-width') || '',
      strokeDasharray: el.getAttribute('stroke-dasharray') || '',
      fill: el.getAttribute('fill') || '',
      fontFamily: el.getAttribute('font-family') || '',
      fontSize: el.getAttribute('font-size') || '16',
      fontColor: el.getAttribute('fill') || FOUNDATION.fontColor,
    };
  },

  write(sid, props) {
    const { el } = AppState.elements.get(sid);
    if (props.stroke !== undefined) el.setAttribute('stroke', props.stroke);
    if (props.strokeWidth !== undefined) el.setAttribute('stroke-width', props.strokeWidth);
    if (props.strokeDasharray !== undefined) el.setAttribute('stroke-dasharray', props.strokeDasharray);
    if (props.fill !== undefined) el.setAttribute('fill', props.fill);
    if (props.fontFamily !== undefined) el.setAttribute('font-family', props.fontFamily);
    if (props.fontStyle !== undefined) el.setAttribute('font-style', props.fontStyle);
    if (props.fontWeight !== undefined) el.setAttribute('font-weight', props.fontWeight);
    if (props.fontSize !== undefined) el.setAttribute('font-size', props.fontSize);
    if (props.fontColor !== undefined) el.setAttribute('fill', props.fontColor);
  },
};

// ── Exporter ─────────────────────────────────────────────────
const Exporter = {
  download() {
    if (!AppState.svgDoc) return;

    const svgEl = AppState.svgDoc.documentElement;
    const origW = parseFloat(svgEl.getAttribute('width') || svgEl.viewBox?.baseVal?.width || 600);
    const origH = parseFloat(svgEl.getAttribute('height') || svgEl.viewBox?.baseVal?.height || 400);

    const outW = parseFloat(document.getElementById('out-width').value) || 400;
    const outHInput = document.getElementById('out-height').value;
    const outH = outHInput ? parseFloat(outHInput) : Math.round(origH * (outW / origW));

    // viewBox 없으면 추가
    if (!svgEl.getAttribute('viewBox')) {
      svgEl.setAttribute('viewBox', `0 0 ${origW} ${origH}`);
    }
    svgEl.setAttribute('width', outW);
    svgEl.setAttribute('height', outH);

    const serializer = new XMLSerializer();
    let svgStr = serializer.serializeToString(svgEl);
    svgStr = svgStr.replace(/ data-sid="[^"]*"/g, '');
    svgStr = svgStr.replace(/ data-arch="[^"]*"/g, '');

    const blob = new Blob([svgStr], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'converted.svg';
    a.click();
    URL.revokeObjectURL(url);
  },
};

// ── UIController ──────────────────────────────────────────────
const UIController = {
  init() {
    const dz = document.getElementById('dropzone');
    const fi = document.getElementById('file-input');

    dz.addEventListener('click', () => fi.click());
    fi.addEventListener('change', e => {
      if (e.target.files[0]) UIController.loadFile(e.target.files[0]);
    });
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.classList.remove('dragover');
      if (e.dataTransfer.files[0]) UIController.loadFile(e.dataTransfer.files[0]);
    });

    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => UIController.switchTab(btn.dataset.tab));
    });

    document.getElementById('btn-apply').addEventListener('click', () => {
      if (!AppState.svgDoc) return;
      StyleManager.applyFoundation();
      UIController.renderSVG();
      UIController.selectElement(null);
    });

    document.getElementById('btn-download').addEventListener('click', Exporter.download);
  },

  loadFile(file) {
    UIController.showError('');
    if (!file.name.toLowerCase().endsWith('.svg') && file.type !== 'image/svg+xml') {
      UIController.showError('SVG 파일만 업로드할 수 있습니다.');
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      try {
        AppState.originalSvgText = e.target.result;
        AppState.svgDoc = SVGParser.parse(AppState.originalSvgText);

        const targets = AppState.svgDoc.querySelectorAll(
          'path, line, polyline, polygon, rect, circle, ellipse, text'
        );
        if (targets.length === 0) {
          UIController.showError('요소를 찾을 수 없습니다.');
          return;
        }

        SVGParser.annotate(AppState.svgDoc);
        StyleManager.applyFoundation();
        UIController.renderSVG();

        document.getElementById('btn-apply').disabled = false;
        document.getElementById('btn-download').disabled = false;
        document.getElementById('btn-dimtool').disabled = false;
        document.getElementById('dropzone').style.borderColor = '#00a651';
      } catch (err) {
        UIController.showError('SVG를 읽을 수 없습니다: ' + err.message);
      }
    };
    reader.readAsText(file);
  },

  renderSVG() {
    const canvas = document.getElementById('svg-canvas');

    if (AppState.activeTab === 'original') {
      canvas.innerHTML = AppState.originalSvgText;
      return;
    }

    const serializer = new XMLSerializer();
    const svgStr = serializer.serializeToString(AppState.svgDoc.documentElement);
    canvas.innerHTML = svgStr;

    // 클릭 이벤트 연결
    canvas.querySelectorAll('[data-sid]').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        UIController.selectElement(el.getAttribute('data-sid'));
      });
    });

    canvas.addEventListener('click', () => UIController.selectElement(null));

    // 선택 상태 복원
    if (AppState.selectedSid) {
      const el = canvas.querySelector(`[data-sid="${AppState.selectedSid}"]`);
      if (el) el.classList.add('selected-el');
    }
  },

  switchTab(tab) {
    AppState.activeTab = tab;
    document.querySelectorAll('.tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    if (AppState.svgDoc) UIController.renderSVG();
  },

  selectElement(sid) {
    document.querySelectorAll('[data-sid].selected-el').forEach(el => {
      el.classList.remove('selected-el');
    });

    AppState.selectedSid = sid;

    if (!sid) {
      UIController.showStylePanel(false);
      document.getElementById('elem-info').textContent = '';
      return;
    }

    const domEl = document.querySelector(`[data-sid="${sid}"]`);
    if (domEl) domEl.classList.add('selected-el');

    const { type } = AppState.elements.get(sid);
    const typeLabel = {
      'outer-stroke': '바깥쪽 선',
      'inner-stroke': '안쪽 선',
      'dashed': '점선',
      'right-angle': '직각 기호',
      'fill': '채우기',
      'text': '텍스트',
    }[type] || type;

    document.getElementById('elem-info').textContent = `선택: ${typeLabel} (${sid})`;
    UIController.showStylePanel(true);
    UIController.populatePanel(sid);
  },

  showStylePanel(show) {
    document.getElementById('no-selection').style.display = show ? 'none' : 'block';
    document.getElementById('style-options').style.display = show ? 'flex' : 'none';
  },

  showError(msg) {
    const el = document.getElementById('error-msg');
    el.style.display = msg ? 'block' : 'none';
    el.textContent = msg;
  },

  _initColorDots(containerId, colors, currentColor, onSelect) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    colors.forEach(color => {
      const dot = document.createElement('div');
      dot.className = 'color-dot';
      dot.style.background = color;
      dot.dataset.color = color;
      dot.title = color;
      if (color.toLowerCase() === (currentColor || '').toLowerCase()) {
        dot.classList.add('selected');
      }
      dot.addEventListener('click', () => {
        container.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
        dot.classList.add('selected');
        onSelect(color);
      });
      container.appendChild(dot);
    });
  },

  populatePanel(sid) {
    const styles = StyleManager.read(sid);
    const entry = AppState.elements.get(sid);
    const { type } = entry;

    // 타입 셀렉터 설정
    const typeSel = document.getElementById('elem-type-sel');
    typeSel.value = type;
    typeSel.onchange = () => {
      entry.type = typeSel.value;
      // 새 타입으로 파운데이션 재적용
      const tempMap = new Map([[sid, entry]]);
      const origElements = AppState.elements;
      AppState.elements = tempMap;
      StyleManager.applyFoundation();
      AppState.elements = origElements;
      UIController.renderSVG();
      UIController.populatePanel(sid);
    };

    // 섹션 표시/숨김
    const isStroke = ['outer-stroke','inner-stroke','right-angle'].includes(type);
    document.getElementById('section-stroke').style.display = isStroke ? 'flex' : 'none';
    document.getElementById('section-dashed').style.display = type === 'dashed' ? 'flex' : 'none';
    document.getElementById('section-fill').style.display = type === 'fill' ? 'flex' : 'none';
    document.getElementById('section-text').style.display = type === 'text' ? 'flex' : 'none';

    if (isStroke) {
      UIController._initColorDots('stroke-colors', FOUNDATION.strokeColors, styles.stroke, color => {
        StyleManager.write(sid, { stroke: color });
        UIController.renderSVG();
      });
      const sw = document.getElementById('stroke-width');
      sw.value = styles.strokeWidth || FOUNDATION.outerStrokeWidth;
      sw.onchange = () => {
        StyleManager.write(sid, { strokeWidth: sw.value });
        UIController.renderSVG();
      };
    }

    if (type === 'dashed') {
      UIController._initColorDots('dashed-colors', FOUNDATION.strokeColors, styles.stroke, color => {
        StyleManager.write(sid, { stroke: color });
        UIController.renderSVG();
      });
      const dw = document.getElementById('dashed-width');
      dw.value = styles.strokeWidth || FOUNDATION.dashedWidth;
      dw.onchange = () => {
        StyleManager.write(sid, { strokeWidth: dw.value });
        UIController.renderSVG();
      };
      const da = document.getElementById('dashed-array');
      da.value = styles.strokeDasharray || FOUNDATION.dashedArray;
      da.onchange = () => {
        StyleManager.write(sid, { strokeDasharray: da.value });
        UIController.renderSVG();
      };

      // 아치 편집: path 요소이고 곡선(C 명령)이 있을 때만 표시
      const { el: dEl } = AppState.elements.get(sid);
      const dTag = dEl.tagName.toLowerCase();
      const dAttr = dEl.getAttribute('d') || '';
      const archSection = document.getElementById('section-arch');
      if (dTag === 'path' && dAttr.toUpperCase().includes('C')) {
        archSection.style.display = 'flex';
        const endpoints = UIController._parsePathEndpoints(dAttr);
        const currentArch = parseFloat(dEl.getAttribute('data-arch') || '20');
        const currentGapPos = parseFloat(dEl.getAttribute('data-gap-pos') || '50');
        const currentGapSize = parseFloat(dEl.getAttribute('data-gap-size') || '10');
        const currentGapEnabled = dEl.getAttribute('data-gap-enabled') === '1';

        const slider = document.getElementById('arch-slider');
        const archDisplay = document.getElementById('arch-val-display');
        const gapEnable = document.getElementById('gap-enable');
        const gapControls = document.getElementById('gap-controls');
        const gapPosSlider = document.getElementById('gap-pos');
        const gapPosDisplay = document.getElementById('gap-pos-display');
        const gapSizeSlider = document.getElementById('gap-size');
        const gapSizeDisplay = document.getElementById('gap-size-display');

        slider.value = currentArch;
        archDisplay.textContent = currentArch;
        gapEnable.checked = currentGapEnabled;
        gapControls.style.display = currentGapEnabled ? 'flex' : 'none';
        gapPosSlider.value = currentGapPos;
        gapPosDisplay.textContent = currentGapPos + '%';
        gapSizeSlider.value = currentGapSize;
        gapSizeDisplay.textContent = currentGapSize;

        const applyArch = () => {
          if (!endpoints) return;
          const archVal = parseFloat(slider.value);
          const gapPos = gapEnable.checked ? parseFloat(gapPosSlider.value) / 100 : 0;
          const gapSz = gapEnable.checked ? parseFloat(gapSizeSlider.value) / 100 : 0;
          const newD = UIController._regenArchPath(endpoints, archVal, gapPos, gapSz);
          if (newD) {
            dEl.setAttribute('d', newD);
            dEl.setAttribute('data-arch', archVal);
            dEl.setAttribute('data-gap-enabled', gapEnable.checked ? '1' : '0');
            dEl.setAttribute('data-gap-pos', gapPosSlider.value);
            dEl.setAttribute('data-gap-size', gapSizeSlider.value);
            UIController.renderSVG();
          }
        };

        slider.oninput = () => { archDisplay.textContent = slider.value; applyArch(); };
        gapPosSlider.oninput = () => { gapPosDisplay.textContent = gapPosSlider.value + '%'; applyArch(); };
        gapSizeSlider.oninput = () => { gapSizeDisplay.textContent = gapSizeSlider.value; applyArch(); };
        gapEnable.onchange = () => {
          gapControls.style.display = gapEnable.checked ? 'flex' : 'none';
          applyArch();
        };
      } else {
        archSection.style.display = 'none';
      }
    }

    if (type === 'fill') {
      const fc = document.getElementById('fill-color');
      fc.value = UIController._toHex(styles.fill) || FOUNDATION.fillColor;
      fc.oninput = () => {
        StyleManager.write(sid, { fill: fc.value });
        UIController.renderSVG();
      };
    }

    if (type === 'text') {
      const isItalic = (styles.fontFamily || '').toLowerCase().includes('times');
      const fontSel = document.getElementById('text-font');
      fontSel.value = isItalic ? 'times' : 'nanum';
      fontSel.onchange = () => {
        const isT = fontSel.value === 'times';
        StyleManager.write(sid, {
          fontFamily: isT ? FOUNDATION.fontFunction : FOUNDATION.fontNormal,
          fontStyle: isT ? 'italic' : 'normal',
          fontWeight: isT ? 'normal' : '700',
        });
        UIController.renderSVG();
      };

      const sizeSel = document.getElementById('text-size');
      sizeSel.value = styles.fontSize || '16';
      sizeSel.onchange = () => {
        StyleManager.write(sid, { fontSize: sizeSel.value });
        UIController.renderSVG();
      };

      const colorInput = document.getElementById('text-color');
      colorInput.value = UIController._toHex(styles.fontColor) || FOUNDATION.fontColor;
      colorInput.oninput = () => {
        StyleManager.write(sid, { fontColor: colorInput.value });
        UIController.renderSVG();
      };
    }
  },

  // path d 속성에서 시작점·끝점 추출
  _parsePathEndpoints(d) {
    try {
      const mMatch = d.match(/M\s*([-\d.]+)[,\s]+([-\d.]+)/i);
      if (!mMatch) return null;
      const start = { x: parseFloat(mMatch[1]), y: parseFloat(mMatch[2]) };
      // C 명령의 마지막 끝점 추출
      const cMatches = [...d.matchAll(/C\s*[-\d.]+[,\s]+[-\d.]+[,\s]+[-\d.]+[,\s]+[-\d.]+[,\s]+([-\d.]+)[,\s]+([-\d.]+)/gi)];
      if (cMatches.length > 0) {
        const last = cMatches[cMatches.length - 1];
        return { start, end: { x: parseFloat(last[1]), y: parseFloat(last[2]) } };
      }
      return null;
    } catch(e) { return null; }
  },

  // 시작점·끝점 + 아치값 + 갭으로 path d 재생성
  // gapCenter: 0~1 (곡선 위 갭 중심 위치), gapSize: 0~1 (갭 크기, 0이면 갭 없음)
  _regenArchPath(endpoints, archOffset, gapCenter = 0, gapSize = 0) {
    const { start: P0, end: P3 } = endpoints;
    const dx = P3.x - P0.x, dy = P3.y - P0.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len < 1) return null;

    // 2차 베지어 컨트롤포인트 (아치 방향: 수직 법선 × offset)
    const nx = -dy / len, ny = dx / len;
    const mx = (P0.x + P3.x) / 2, my = (P0.y + P3.y) / 2;
    const CP = { x: mx + nx * archOffset, y: my + ny * archOffset };

    // 2차 → 3차 베지어 변환 (rational conversion)
    const c1 = { x: P0.x + 2/3*(CP.x-P0.x), y: P0.y + 2/3*(CP.y-P0.y) };
    const c2 = { x: P3.x + 2/3*(CP.x-P3.x), y: P3.y + 2/3*(CP.y-P3.y) };

    function fmt(n) { return Math.round(n * 1000) / 1000; }
    function seg(s) {
      return `M ${fmt(s.p0.x)},${fmt(s.p0.y)} C ${fmt(s.p1.x)},${fmt(s.p1.y)} ${fmt(s.p2.x)},${fmt(s.p2.y)} ${fmt(s.p3.x)},${fmt(s.p3.y)}`;
    }

    if (gapSize <= 0) {
      return `M ${fmt(P0.x)},${fmt(P0.y)} C ${fmt(c1.x)},${fmt(c1.y)} ${fmt(c2.x)},${fmt(c2.y)} ${fmt(P3.x)},${fmt(P3.y)}`;
    }

    // De Casteljau 3차 베지어 분할
    function splitAt(p0, p1, p2, p3, t) {
      function lerp(a, b) { return { x: a.x+t*(b.x-a.x), y: a.y+t*(b.y-a.y) }; }
      const A = lerp(p0, p1), B = lerp(p1, p2), C = lerp(p2, p3);
      const D = lerp(A, B), E = lerp(B, C);
      const F = lerp(D, E);
      return [
        { p0, p1: A, p2: D, p3: F },   // 왼쪽 [0, t]
        { p0: F, p1: E, p2: C, p3 },   // 오른쪽 [t, 1]
      ];
    }

    const tc = Math.max(0.1, Math.min(0.9, gapCenter));
    const half = Math.max(0.02, Math.min(0.25, gapSize / 2));
    const t1 = Math.max(0.05, tc - half);
    const t2 = Math.min(0.95, tc + half);

    // t1에서 분할 → left [0,t1] + rest [t1,1]
    const [left, rest] = splitAt(P0, c1, c2, P3, t1);
    // rest를 재매개변수화해서 t2 위치에서 분할
    const t2local = (t2 - t1) / (1 - t1);
    const [, right] = splitAt(rest.p0, rest.p1, rest.p2, rest.p3, t2local);

    return seg(left) + ' ' + seg(right);
  },

  // named color → hex 변환 (color input은 hex만 받음)
  _toHex(color) {
    if (!color) return '#000000';
    if (color.startsWith('#')) return color;
    const ctx = document.createElement('canvas').getContext('2d');
    ctx.fillStyle = color;
    return ctx.fillStyle;
  },
};

// ── DimensionTool ─────────────────────────────────────────────
const DimensionTool = {
  active: false,
  points: [],       // [{x, y}, {x, y}] SVG 좌표
  color: '#898989',

  enter() {
    DimensionTool.active = true;
    DimensionTool.points = [];
    document.getElementById('btn-dimtool').classList.add('active');
    document.getElementById('btn-dimtool').textContent = '📐 치수선 모드 ON (ESC 취소)';
    document.getElementById('dim-panel').style.display = 'flex';
    document.getElementById('dim-confirm').disabled = true;
    document.getElementById('dim-step-msg').textContent = '1단계: 시작점을 클릭하세요';

    // 색상 도트 초기화
    UIController._initColorDots('dim-colors', FOUNDATION.strokeColors, DimensionTool.color, c => {
      DimensionTool.color = c;
      DimensionTool._updatePreview();
    });

    const canvas = document.getElementById('svg-canvas');
    canvas.classList.add('dim-mode');
    canvas.addEventListener('click', DimensionTool._onCanvasClick);

    document.addEventListener('keydown', DimensionTool._onKey);

    // 슬라이더 실시간 반영
    const slider = document.getElementById('dim-arch');
    slider.addEventListener('input', () => {
      document.getElementById('dim-arch-val').textContent = slider.value;
      DimensionTool._updatePreview();
    });

    document.getElementById('dim-label').addEventListener('input', DimensionTool._updatePreview);
    document.getElementById('dim-cancel').addEventListener('click', DimensionTool.exit);
    document.getElementById('dim-confirm').addEventListener('click', DimensionTool._commit);
  },

  exit() {
    DimensionTool.active = false;
    DimensionTool.points = [];
    document.getElementById('btn-dimtool').classList.remove('active');
    document.getElementById('btn-dimtool').textContent = '📐 치수선 추가';
    document.getElementById('dim-panel').style.display = 'none';

    const canvas = document.getElementById('svg-canvas');
    canvas.classList.remove('dim-mode');
    canvas.removeEventListener('click', DimensionTool._onCanvasClick);
    document.removeEventListener('keydown', DimensionTool._onKey);

    DimensionTool._clearPreview();
  },

  _onKey(e) {
    if (e.key === 'Escape') DimensionTool.exit();
  },

  _onCanvasClick(e) {
    if (!AppState.svgDoc) return;
    e.stopPropagation();

    const svgEl = document.querySelector('#svg-canvas svg');
    if (!svgEl) return;

    // 마우스 → SVG 좌표 변환
    const pt = svgEl.createSVGPoint();
    pt.x = e.clientX;
    pt.y = e.clientY;
    const svgPt = pt.matrixTransform(svgEl.getScreenCTM().inverse());

    DimensionTool.points.push({ x: svgPt.x, y: svgPt.y });
    DimensionTool._drawMarker(svgEl, svgPt.x, svgPt.y, DimensionTool.points.length);

    if (DimensionTool.points.length === 1) {
      document.getElementById('dim-step-msg').textContent = '2단계: 끝점을 클릭하세요';
    } else if (DimensionTool.points.length === 2) {
      document.getElementById('dim-step-msg').textContent = '레이블·아치 높이를 조정 후 추가';
      document.getElementById('dim-confirm').disabled = false;
      DimensionTool._updatePreview();
    } else {
      // 3번째 클릭 시 리셋
      DimensionTool.points = [{ x: svgPt.x, y: svgPt.y }];
      document.getElementById('dim-step-msg').textContent = '2단계: 끝점을 클릭하세요';
      document.getElementById('dim-confirm').disabled = true;
      DimensionTool._clearPreview();
      DimensionTool._drawMarker(svgEl, svgPt.x, svgPt.y, 1);
    }
  },

  _drawMarker(svgEl, x, y, idx) {
    // 기존 마커 제거
    svgEl.querySelectorAll(`.dim-marker-${idx}`).forEach(el => el.remove());
    const ns = 'http://www.w3.org/2000/svg';
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('cx', x);
    c.setAttribute('cy', y);
    c.setAttribute('r', 4);
    c.setAttribute('fill', '#1b75bc');
    c.setAttribute('class', `dim-marker dim-marker-${idx}`);
    c.setAttribute('pointer-events', 'none');
    svgEl.appendChild(c);
  },

  _clearPreview() {
    const svgEl = document.querySelector('#svg-canvas svg');
    if (svgEl) {
      svgEl.querySelectorAll('.dim-marker, #dim-preview-group').forEach(el => el.remove());
    }
  },

  _updatePreview() {
    if (DimensionTool.points.length < 2) return;
    const svgEl = document.querySelector('#svg-canvas svg');
    if (!svgEl) return;

    const old = svgEl.querySelector('#dim-preview-group');
    if (old) old.remove();

    const label = document.getElementById('dim-label').value;
    const offset = parseFloat(document.getElementById('dim-arch').value);
    const p1 = DimensionTool.points[0];
    const p2 = DimensionTool.points[1];

    const g = DimensionTool._buildGroup(p1, p2, label, offset, DimensionTool.color, true);
    g.setAttribute('id', 'dim-preview-group');
    svgEl.appendChild(g);
  },

  _commit() {
    if (DimensionTool.points.length < 2) return;
    const label = document.getElementById('dim-label').value;
    const offset = parseFloat(document.getElementById('dim-arch').value);
    const p1 = DimensionTool.points[0];
    const p2 = DimensionTool.points[1];

    // svgDoc에 삽입
    const ns = 'http://www.w3.org/2000/svg';
    const g = AppState.svgDoc.createElementNS(ns, 'g');
    g.setAttribute('class', 'dim-line');

    const group = DimensionTool._buildGroup(p1, p2, label, offset, DimensionTool.color, false);
    // innerHTML을 svgDoc 요소로 변환
    const tmpDiv = document.createElement('div');
    tmpDiv.innerHTML = new XMLSerializer().serializeToString(group);
    const serialized = new XMLSerializer().serializeToString(group);
    const parsed = new DOMParser().parseFromString(serialized, 'image/svg+xml');
    const importedG = AppState.svgDoc.importNode(parsed.documentElement, true);

    // data-sid 부여
    let maxSid = AppState.elements.size;
    importedG.querySelectorAll('path, text').forEach(el => {
      const sid = 'sid-' + (maxSid++);
      el.setAttribute('data-sid', sid);
      const type = el.tagName.toLowerCase() === 'text' ? 'text' : 'dashed';
      AppState.elements.set(sid, { el, type });
    });

    AppState.svgDoc.documentElement.appendChild(importedG);

    DimensionTool.exit();
    UIController.renderSVG();
  },

  // ── 베지어 수학 (DimensionLine.jsx 이식) ──────────────────────
  _buildGroup(p1, p2, label, offset, color, isPreview) {
    const ns = 'http://www.w3.org/2000/svg';

    const p1x = p1.x, p1y = p1.y, p2x = p2.x, p2y = p2.y;
    const dx = p2x - p1x, dy = p2y - p1y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len < 1) return document.createElementNS(ns, 'g');

    // 법선 방향으로 제어점 이동 (SVG Y축 반전 고려: offset 부호 그대로)
    const nx = -dy / len, ny = dx / len;
    const mx = (p1x + p2x) / 2, my = (p1y + p2y) / 2;
    const cpx = mx + nx * offset, cpy = my + ny * offset;

    // 텍스트 너비 기반 gap
    const labelLen = label.length || 0;
    const estTextW = labelLen * 9;
    const gapFrac = Math.min(estTextW / (len + 0.01) * 0.75, 0.38);
    const t1 = Math.max(0.01, 0.5 - gapFrac);
    const t2 = Math.min(0.99, 0.5 + gapFrac);

    // 2차 베지어 → de Casteljau 분할
    function bPt(t) {
      return {
        x: (1-t)*(1-t)*p1x + 2*(1-t)*t*cpx + t*t*p2x,
        y: (1-t)*(1-t)*p1y + 2*(1-t)*t*cpy + t*t*p2y,
      };
    }
    function lerp(a, b, t) { return { x: a.x+t*(b.x-a.x), y: a.y+t*(b.y-a.y) }; }

    const P0 = { x: p1x, y: p1y };
    const CP = { x: cpx, y: cpy };
    const P2 = { x: p2x, y: p2y };

    // Segment 1: P0 → bPt(t1)
    const A1 = lerp(P0, CP, t1);  // rightDir of P0
    const B1 = lerp(CP, P2, t1);
    const C1 = lerp(A1, B1, t1);  // leftDir of end1 = bPt(t1)
    const end1 = bPt(t1);

    // Segment 2: bPt(t2) → P2
    const A2 = lerp(P0, CP, t2);
    const B2 = lerp(CP, P2, t2);  // leftDir of P2
    const C2 = lerp(A2, B2, t2);  // rightDir of start2 = bPt(t2)
    const start2 = bPt(t2);

    const midPt = bPt(0.5);

    function fmt(n) { return Math.round(n * 100) / 100; }
    function pathD(sx, sy, c1x, c1y, c2x, c2y, ex, ey) {
      return `M ${fmt(sx)},${fmt(sy)} C ${fmt(c1x)},${fmt(c1y)} ${fmt(c2x)},${fmt(c2y)} ${fmt(ex)},${fmt(ey)}`;
    }

    const g = document.createElementNS(ns, 'g');
    g.setAttribute('class', 'dim-line-group');

    function makePath(d) {
      const path = document.createElementNS(ns, 'path');
      path.setAttribute('d', d);
      path.setAttribute('stroke', color);
      path.setAttribute('stroke-width', '1');
      path.setAttribute('stroke-dasharray', '3 2');
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke-linecap', 'butt');
      path.setAttribute('data-arch', offset);
      if (isPreview) path.setAttribute('opacity', '0.7');
      return path;
    }

    // 세그먼트 1: P0 → end1
    g.appendChild(makePath(pathD(p1x, p1y, A1.x, A1.y, C1.x, C1.y, end1.x, end1.y)));
    // 세그먼트 2: start2 → P2
    g.appendChild(makePath(pathD(start2.x, start2.y, C2.x, C2.y, B2.x, B2.y, p2x, p2y)));

    // 텍스트
    if (label) {
      const text = document.createElementNS(ns, 'text');
      text.setAttribute('x', fmt(midPt.x));
      text.setAttribute('y', fmt(midPt.y));
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'middle');
      text.setAttribute('font-family', "'Nanum Myeongjo', serif");
      text.setAttribute('font-weight', '700');
      text.setAttribute('font-size', '16');
      text.setAttribute('fill', FOUNDATION.fontColor);
      if (isPreview) text.setAttribute('opacity', '0.7');
      text.textContent = label;
      g.appendChild(text);
    }

    return g;
  },
};

// ── 초기화 ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  UIController.init();

  // 치수선 버튼
  document.getElementById('btn-dimtool').addEventListener('click', () => {
    if (DimensionTool.active) {
      DimensionTool.exit();
    } else {
      if (!AppState.svgDoc) return;
      UIController.selectElement(null);
      DimensionTool.enter();
    }
  });
});
</script>
</body>
</html>
